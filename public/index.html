<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warangal Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --sasi-color: #3b82f6;
            --lalitha-color: #ec4899;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        /* App Container mimicking a phone */
        .app-container { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; background: var(--bg); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); overflow-y: auto; padding-bottom: 100px; }

        /* Hero / Header Section */
        .header-card { background: linear-gradient(135deg, #1e1b4b, #4f46e5); padding: 40px 20px 30px; border-radius: 0 0 30px 30px; color: white; box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2); position: relative; overflow: hidden; }
        .header-card::after { content: '🏰'; position: absolute; right: -20px; top: -10px; font-size: 150px; opacity: 0.1; transform: rotate(15deg); }
        .header-title { font-size: 1.2rem; font-weight: 500; opacity: 0.9; margin-bottom: 5px; }
        .settlement-text { font-size: 1.8rem; font-weight: 700; line-height: 1.2; margin-bottom: 20px; }
        
        .user-balances { display: flex; justify-content: space-between; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); }
        .balance-item { display: flex; flex-direction: column; }
        .balance-name { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .balance-amount { font-size: 1.4rem; font-weight: 600; }

        /* Feed Section */
        .feed-header { padding: 25px 20px 10px; font-size: 1.2rem; font-weight: 600; color: var(--text-main); }
        .expense-list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .expense-item { background: var(--surface); padding: 16px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: transform 0.2s; animation: slideUp 0.4s ease forwards; opacity: 0; transform: translateY(20px); cursor: pointer; }
        .expense-item:active { transform: scale(0.98); }
        
        .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 600; font-size: 1.2rem; color: white; flex-shrink: 0; }
        .avatar.sasi { background: linear-gradient(135deg, #60a5fa, #2563eb); }
        .avatar.lalitha { background: linear-gradient(135deg, #f472b6, #db2777); }
        
        .expense-details { flex-grow: 1; overflow: hidden; }
        .expense-title { font-weight: 600; font-size: 1rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .expense-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 5px; margin-top: 3px; }
        
        .expense-price { font-weight: 700; font-size: 1.1rem; color: var(--text-main); }

        /* Floating Action Button (FAB) */
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #4f46e5, #818cf8); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); cursor: pointer; border: none; transition: all 0.3s; z-index: 100; }
        .fab:hover { transform: translateX(-50%) scale(1.05); }
        .fab:active { transform: translateX(-50%) scale(0.95); }

        /* Bottom Sheet Modal */
        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .bottom-sheet-overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 480px; background: var(--surface); border-radius: 30px 30px 0 0; padding: 30px 25px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1001; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .bottom-sheet-overlay.active + .bottom-sheet, .bottom-sheet.active { transform: translateX(-50%) translateY(0); }
        
        .sheet-handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 20px; }
        .sheet-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; text-align: center; }

        /* Beautiful Form Elements */
        .payer-toggle { display: flex; background: #f1f5f9; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .payer-option { flex: 1; text-align: center; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; color: var(--text-muted); }
        .payer-option.active { background: white; color: var(--text-main); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input, .input-group select { width: 100%; padding: 16px 16px 16px 45px; border: 2px solid #e2e8f0; border-radius: 15px; font-size: 1rem; background: transparent; transition: border-color 0.3s; appearance: none; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary); }
        .input-group .icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3); }
        .btn-submit:active { transform: scale(0.98); }
        
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); margin-top: 10px; box-shadow: none; }
        
        /* Action buttons for edit mode */
        .edit-actions { display: flex; gap: 10px; margin-top: 20px; }
        .edit-actions button { flex: 1; padding: 16px; border-radius: 15px; font-weight: 600; border: none; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; }
        .btn-trash { background: #fee2e2; color: #ef4444; flex: 0.3; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container" id="app">
    
    <div class="header-card">
        <div class="header-title">Warangal Trip</div>
        <div class="settlement-text" id="settlement">Calculating...</div>
        
        <div class="user-balances">
            <div class="balance-item">
                <span class="balance-name">Sasi</span>
                <span class="balance-amount">₹<span id="sasi-total">0</span></span>
            </div>
            <div class="balance-item" style="align-items: flex-end;">
                <span class="balance-name">Lalitha</span>
                <span class="balance-amount">₹<span id="lalitha-total">0</span></span>
            </div>
        </div>
    </div>

    <div class="feed-header">Recent Expenses</div>
    <div class="expense-list" id="expense-list">
        </div>

    <button class="fab" onclick="openAddSheet()">+</button>
</div>

<div class="bottom-sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="expenseSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">New Expense</div>
    
    <form id="expense-form">
        <input type="hidden" id="form-mode" value="add">
        <input type="hidden" id="edit-id">

        <div class="payer-toggle" id="payerToggle">
            <div class="payer-option active" data-value="Sasi" onclick="setPayer('Sasi')">Sasi Paid</div>
            <div class="payer-option" data-value="Lalitha" onclick="setPayer('Lalitha')">Lalitha Paid</div>
        </div>
        <input type="hidden" id="payer" value="Sasi">

        <div class="input-group">
            <span class="icon">₹</span>
            <input type="number" id="amount" placeholder="Amount" required min="1" step="0.01">
        </div>

        <div class="input-group">
            <span class="icon">📝</span>
            <input type="text" id="description" placeholder="What was it for?" required>
        </div>

        <div class="input-group">
            <span class="icon">🏷️</span>
            <select id="category" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Food">Food & Drinks</option>
                <option value="Transport">Transport</option>
                <option value="Tickets">Tickets & Entry</option>
                <option value="Accommodation">Accommodation</option>
                <option value="Misc">Miscellaneous</option>
            </select>
        </div>

        <div class="input-group">
            <span class="icon">📅</span>
            <input type="date" id="expense_date" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Save Expense</button>
        
        <div class="edit-actions" id="editActions" style="display: none;">
            <button type="submit" class="btn-save">Update</button>
            <button type="button" class="btn-trash" onclick="deleteCurrentExpense()">🗑️</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('expense_date').valueAsDate = new Date();
    const API_URL = '/api/expenses'; 
    let globalExpenses = []; 

    // Formatting currency nicely
    const formatMoney = (amount) => new Intl.NumberFormat('en-IN').format(amount);

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            globalExpenses = data.expenses; 
            
            // Animate numbers up
            animateValue("sasi-total", 0, data.sasiTotal, 1000);
            animateValue("lalitha-total", 0, data.lalithaTotal, 1000);
            
            document.getElementById('settlement').innerText = data.settlementMessage;

            if (data.settlementMessage.includes("squared up") && (data.sasiTotal > 0 || data.lalithaTotal > 0)) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.4 }, colors: ['#4f46e5', '#ec4899', '#3b82f6'] });
            }

            const list = document.getElementById('expense-list');
            list.innerHTML = '';
            
            globalExpenses.forEach((exp, index) => {
                const dateObj = new Date(exp.expense_date);
                const dateString = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                const item = document.createElement('div');
                item.className = 'expense-item';
                item.style.animationDelay = `${index * 0.05}s`;
                // Clicking an item opens it for editing
                item.onclick = () => openEditSheet(exp.id);

                const initial = exp.payer.charAt(0);
                const avatarClass = exp.payer === 'Sasi' ? 'sasi' : 'lalitha';

                item.innerHTML = `
                    <div class="avatar ${avatarClass}">${initial}</div>
                    <div class="expense-details">
                        <div class="expense-title">${exp.description}</div>
                        <div class="expense-meta">${exp.category} • ${dateString}</div>
                    </div>
                    <div class="expense-price">₹${formatMoney(exp.amount)}</div>
                `;
                list.appendChild(item);
            });
        } catch (error) {
            console.error("Error fetching data", error);
        }
    }

    // Number Counter Animation
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = formatMoney((progress * (end - start) + start).toFixed(2));
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    // Sheet Logic
    const overlay = document.getElementById('sheetOverlay');
    const sheet = document.getElementById('expenseSheet');
    
    function setPayer(payerName) {
        document.getElementById('payer').value = payerName;
        document.querySelectorAll('.payer-option').forEach(el => {
            el.classList.remove('active');
            if(el.dataset.value === payerName) el.classList.add('active');
        });
    }

    function openAddSheet() {
        document.getElementById('form-mode').value = 'add';
        document.getElementById('sheetTitle').innerText = 'New Expense';
        document.getElementById('expense-form').reset();
        document.getElementById('expense_date').valueAsDate = new Date();
        setPayer('Sasi'); // default
        
        document.getElementById('submitBtn').style.display = 'block';
        document.getElementById('editActions').style.display = 'none';
        
        overlay.classList.add('active');
        sheet.classList.add('active');
    }

    function openEditSheet(id) {
        const exp = globalExpenses.find(e => e.id === id);
        if (!exp) return;

        document.getElementById('form-mode').value = 'edit';
        document.getElementById('edit-id').value = exp.id;
        document.getElementById('sheetTitle').innerText = 'Edit Expense';
        
        setPayer(exp.payer);
        document.getElementById('amount').value = exp.amount;
        document.getElementById('description').value = exp.description;
        document.getElementById('category').value = exp.category;
        
        const dateString = new Date(exp.expense_date).toISOString().split('T')[0];
        document.getElementById('expense_date').value = dateString;
        
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('editActions').style.display = 'flex';
        
        overlay.classList.add('active');
        sheet.classList.add('active');
    }

    function closeSheet() {
        overlay.classList.remove('active');
        sheet.classList.remove('active');
    }

    // Form Submission (Handles both Add and Edit)
    document.getElementById('expense-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const mode = document.getElementById('form-mode').value;
        
        const payload = {
            payer: document.getElementById('payer').value,
            amount: document.getElementById('amount').value,
            description: document.getElementById('description').value,
            category: document.getElementById('category').value,
            expense_date: document.getElementById('expense_date').value
        };

        if (mode === 'add') {
            document.getElementById('submitBtn').innerText = 'Saving...';
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } else {
            const id = document.getElementById('edit-id').value;
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        
        closeSheet();
        setTimeout(fetchData, 300); // Wait for sheet to slide down before refreshing
    });

    async function deleteCurrentExpense() {
        const id = document.getElementById('edit-id').value;
        if (confirm("Delete this expense?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            closeSheet();
            setTimeout(fetchData, 300);
        }
    }

    // Init
    fetchData();
</script>
</body>
</html>
